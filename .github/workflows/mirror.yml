name: Mirror to self-hosted GitHub

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - name: Mirror `main` and `dev` branches via HTTPS
      env:
        SELF_HOSTED_REPO_HTTPS_URL: ${{ secrets.SELF_HOSTED_REPO_HTTPS_URL }}
        PAT: ${{ secrets.PAT }}
      run: |
        # Clone the repo (all branches, no tags for speed)
        git clone --no-tags https://github.com/jfrog/jfrog-cli-security.git repo
        cd repo

        # Rewrite origin URL with PAT for authentication
        AUTHENTICATED_URL=$(echo "$SELF_HOSTED_REPO_HTTPS_URL" | sed -e "s#https://#https://$PAT@#")
        git remote set-url origin "$AUTHENTICATED_URL"

        # Push only the main and dev branches
        git push origin main
        git push origin dev
