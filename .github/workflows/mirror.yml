name: Mirror to self-hosted GitHub (HTTPS)

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - name: Mirror repository via HTTPS
      env:
        SELF_HOSTED_GITHUB_HOST: ${{ secrets.SELF_HOSTED_GITHUB_HOST }}
        SELF_HOSTED_REPO_HTTPS_URL: ${{ secrets.SELF_HOSTED_REPO_HTTPS_URL }}
        PAT: ${{ secrets.PAT }}
      run: |
        # Clone source repo as mirror (read-only, usually no auth needed)
        git clone --branch main --branch dev --single-branch --no-tags https://github.com/jfrog/jfrog-cli-security.git repo
        cd jfrog-cli-security.git

        # Rewrite origin URL with PAT for authentication
        # Insert token into the HTTPS URL: https://<PAT>@hostname/user/repo.git
        # Ensure SELF_HOSTED_REPO_HTTPS_URL is like: https://github.jfrog.info/user/repo.git
        AUTHENTICATED_URL=$(echo "$SELF_HOSTED_REPO_HTTPS_URL" | sed -e "s#https://#https://$PAT@#")

        git remote set-url origin "$AUTHENTICATED_URL"

        # Push all refs to self-hosted repo
        git push --mirror
